name: Weekly benefits sync

on:
  schedule:
    # 매주 월요일 01:00 UTC = 한국시간 오전 10시
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Sync benefits from 보조금24 API
        env:
          ODCLOUD_SERVICE_KEY: ${{ secrets.ODCLOUD_SERVICE_KEY }}
        run: npm run sync:benefits

      # push되면 deploy.yml이 Cloudflare Pages로 자동 배포합니다.
      - name: Commit content changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/benefits
          if git diff --staged --quiet; then
            echo "No content changes"
          else
            git commit -m "chore: weekly sync electricity benefits from gov24 API"
            git push
          fi
